<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oNeuro - Neural Molecular Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a12;
            color: #fff;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ===== PANELS ===== */
        .panel {
            position: absolute;
            background: rgba(15, 15, 25, 0.92);
            border: 1px solid rgba(80, 200, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Title */
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 200;
            letter-spacing: 12px;
            color: #50c8ff;
            text-transform: uppercase;
        }

        #subtitle {
            position: absolute;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            letter-spacing: 4px;
            color: #405060;
        }

        /* LEFT - Brain */
        #brain-panel {
            top: 100px;
            left: 20px;
            width: 200px;
        }

        .brain-region {
            margin: 12px 0;
        }

        .brain-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .brain-name { color: #60a0c0; font-weight: 500; }
        .brain-val { color: #00ff88; font-weight: 600; }

        .brain-bar {
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .brain-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.15s ease;
        }

        /* Signal flow */
        .signal-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(80,200,255,0.1);
        }

        .signal-node {
            padding: 6px 10px;
            background: rgba(80, 200, 255, 0.1);
            border: 1px solid rgba(80, 200, 255, 0.3);
            border-radius: 6px;
            font-size: 9px;
            color: #50c8ff;
        }

        .signal-arrow {
            color: #305060;
            font-size: 12px;
        }

        /* RIGHT - Motor */
        #motor-panel {
            top: 100px;
            right: 20px;
            width: 180px;
        }

        .motor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .motor-card {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .motor-value {
            font-size: 28px;
            font-weight: 300;
            color: #00ff88;
        }

        .motor-label {
            font-size: 9px;
            color: #506070;
            margin-top: 4px;
        }

        /* BOTTOM - Controls */
        #controls-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            background: rgba(80, 200, 255, 0.1);
            border: 1px solid rgba(80, 200, 255, 0.3);
            color: #50c8ff;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(80, 200, 255, 0.25);
            transform: translateY(-2px);
        }

        button.active {
            background: rgba(0, 255, 136, 0.15);
            border-color: #00ff88;
            color: #00ff88;
        }

        /* Stats */
        #stats-panel {
            bottom: 20px;
            left: 20px;
            font-size: 11px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            color: #607080;
        }

        .stat-val { color: #00ff88; font-weight: 500; }

        /* Info */
        #info-panel {
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            color: #405060;
            text-align: right;
        }

        /* Arrow visualization */
        .direction-arrow {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid #00ff88;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #00ff88;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .direction-arrow.visible {
            opacity: 1;
        }

        /* ===== LOADING ===== */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a12;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading.hidden { opacity: 0; pointer-events: none; }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(80, 200, 255, 0.15);
            border-top-color: #50c8ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="loader"></div></div>

    <div id="canvas-container"></div>

    <div id="title">oNeuro</div>
    <div id="subtitle">Neural Molecular Dynamics</div>

    <!-- BRAIN PANEL -->
    <div class="panel" id="brain-panel">
        <div style="font-size: 10px; letter-spacing: 3px; color: #50c8ff; margin-bottom: 16px;">NEURAL ACTIVITY</div>

        <div class="brain-region">
            <div class="brain-label">
                <span class="brain-name">AL (Odor)</span>
                <span class="brain-val" id="val-al">0%</span>
            </div>
            <div class="brain-bar"><div class="brain-fill" id="bar-al" style="width: 0%; background: linear-gradient(90deg, #00ff88, #50ffaa);"></div></div>
        </div>

        <div class="brain-region">
            <div class="brain-label">
                <span class="brain-name">MB (Memory)</span>
                <span class="brain-val" id="val-mb">0%</span>
            </div>
            <div class="brain-bar"><div class="brain-fill" id="bar-mb" style="width: 0%; background: linear-gradient(90deg, #50b4ff, #88d4ff);"></div></div>
        </div>

        <div class="brain-region">
            <div class="brain-label">
                <span class="brain-name">CX (Nav)</span>
                <span class="brain-val" id="val-cx">0%</span>
            </div>
            <div class="brain-bar"><div class="brain-fill" id="bar-cx" style="width: 0%; background: linear-gradient(90deg, #ff66aa, #ff88cc);"></div></div>
        </div>

        <div class="brain-region">
            <div class="brain-label">
                <span class="brain-name">VNC (Motor)</span>
                <span class="brain-val" id="val-vnc">0%</span>
            </div>
            <div class="brain-bar"><div class="brain-fill" id="bar-vnc" style="width: 0%; background: linear-gradient(90deg, #ffaa00, #ffcc44);"></div></div>
        </div>

        <div class="signal-flow">
            <div class="signal-node">ODOR</div>
            <div class="signal-arrow">→</div>
            <div class="signal-node">AL</div>
            <div class="signal-arrow">→</div>
            <div class="signal-node">CX</div>
            <div class="signal-arrow">→</div>
            <div class="signal-node">MOVE</div>
        </div>
    </div>

    <!-- MOTOR PANEL -->
    <div class="panel" id="motor-panel">
        <div style="font-size: 10px; letter-spacing: 3px; color: #ffaa00; margin-bottom: 12px;">MOTOR OUTPUT</div>

        <div class="motor-grid">
            <div class="motor-card">
                <div class="motor-value" id="motor-speed">0</div>
                <div class="motor-label">Speed</div>
            </div>
            <div class="motor-card">
                <div class="motor-value" id="motor-turn">0°</div>
                <div class="motor-label">Turn</div>
            </div>
            <div class="motor-card">
                <div class="motor-value" id="motor-odor">0%</div>
                <div class="motor-label">Odor</div>
            </div>
            <div class="motor-card">
                <div class="motor-value" id="motor-food">0</div>
                <div class="motor-label">Food</div>
            </div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="panel" id="controls-panel">
        <button id="btn-play" class="active">Play</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-food">Add Food</button>
    </div>

    <!-- STATS -->
    <div class="panel" id="stats-panel">
        <div class="stat-row"><span>Particles</span><span class="stat-val" id="stat-particles">0</span></div>
        <div class="stat-row"><span>FPS</span><span class="stat-val" id="stat-fps">0</span></div>
        <div class="stat-row"><span>Step</span><span class="stat-val" id="stat-step">0</span></div>
    </div>

    <!-- INFO -->
    <div id="info-panel">
        <div>FLY AGENT</div>
        <div id="fly-status" style="color: #00ff88;">Searching...</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ===== CONFIG =====
        const CONFIG = {
            particles: 800,
            boxSize: 30,
            gridSize: 3,
            cutoff: 3,
        };

        // ===== STATE =====
        let scene, camera, renderer;
        let particles, particleMesh;
        let foodMarkers = [];
        let fly = { x: 15, z: 15, heading: 0, speed: 0 };
        let flyMesh;

        // Neural state
        let brain = { al: 0, mb: 0, cx: 0, vnc: 0, odor: 0 };
        let step = 0, fps = 60, isPlaying = true;
        let lastTime = performance.now(), frameCount = 0;

        // ===== INIT =====
        async function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);

            // Camera
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 35, 50);
            camera.lookAt(CONFIG.boxSize/2, 0, CONFIG.boxSize/2);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Mouse control
            let dragging = false, lastMouse = {x:0, y:0};
            renderer.domElement.addEventListener('mousedown', e => { dragging = true; lastMouse = {x:e.clientX, y:e.clientY}; });
            renderer.domElement.addEventListener('mouseup', () => dragging = false);
            renderer.domElement.addEventListener('mousemove', e => {
                if(!dragging) return;
                camera.position.x += (e.clientX - lastMouse.x) * 0.15;
                camera.lookAt(CONFIG.boxSize/2, 0, CONFIG.boxSize/2);
                lastMouse = {x:e.clientX, y:e.clientY};
            });

            // Floor with grid
            const floorGeo = new THREE.PlaneGeometry(CONFIG.boxSize * 2, CONFIG.boxSize * 2);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x0a0a15 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(CONFIG.boxSize/2, -0.1, CONFIG.boxSize/2);
            scene.add(floor);

            // Grid
            const grid = new THREE.GridHelper(CONFIG.boxSize * 2, 20, 0x1a1a2a, 0x101018);
            grid.position.set(CONFIG.boxSize/2, 0, CONFIG.boxSize/2);
            scene.add(grid);

            // Ambient light
            scene.add(new THREE.AmbientLight(0x404060, 0.8));

            // Point lights
            const light1 = new THREE.PointLight(0x00ff88, 0.5, 50);
            light1.position.set(10, 15, 10);
            scene.add(light1);

            const light2 = new THREE.PointLight(0x50b4ff, 0.3, 50);
            light2.position.set(25, 15, 25);
            scene.add(light2);

            // Initialize
            initParticles();
            initFly();
            initFood();
            initControls();
            window.addEventListener('resize', onResize);

            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
            animate();
        }

        // ===== PARTICLES =====
        function initParticles() {
            const geo = new THREE.SphereGeometry(0.2, 6, 4);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
            particles = new THREE.InstancedMesh(geo, mat, CONFIG.particles);

            const positions = new Float32Array(CONFIG.particles * 3);
            const velocities = new Float32Array(CONFIG.particles * 3);

            const dummy = new THREE.Object3D();
            const color = new THREE.Color();

            for(let i = 0; i < CONFIG.particles; i++) {
                const i3 = i * 3;
                positions[i3] = Math.random() * CONFIG.boxSize;
                positions[i3+1] = Math.random() * 4 + 1;
                positions[i3+2] = Math.random() * CONFIG.boxSize;

                dummy.position.set(positions[i3], positions[i3+1], positions[i3+2]);
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);

                color.setHSL(0.4, 0.9, 0.5);
                particles.setColorAt(i, color);
            }

            particles.instanceMatrix.needsUpdate = true;
            particles.instanceColor.needsUpdate = true;
            scene.add(particles);

            window.particlePositions = positions;
            window.particleVelocities = velocities;
        }

        // ===== FLY =====
        function initFly() {
            const group = new THREE.Group();

            // Body
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 1, 4, 8),
                new THREE.MeshBasicMaterial({ color: 0x303040 })
            );
            body.rotation.x = Math.PI / 2;
            group.add(body);

            // Wings
            const wingGeo = new THREE.PlaneGeometry(1.2, 0.5);
            const wingMat = new THREE.MeshBasicMaterial({ color: 0x88bbdd, transparent: true, opacity: 0.5, side: THREE.DoubleSide });

            const wingL = new THREE.Mesh(wingGeo, wingMat);
            wingL.position.set(0, 0.3, 0.5);
            wingL.rotation.x = -0.3;
            group.add(wingL);

            const wingR = new THREE.Mesh(wingGeo, wingMat);
            wingR.position.set(0, 0.3, -0.5);
            wingR.rotation.x = 0.3;
            group.add(wingR);

            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 8, 6),
                new THREE.MeshBasicMaterial({ color: 0x404050 })
            );
            head.position.set(0, 0.2, 0.8);
            group.add(head);

            // Antennae
            const antGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.5);
            const antMat = new THREE.MeshBasicMaterial({ color: 0x606070 });

            const antL = new THREE.Mesh(antGeo, antMat);
            antL.position.set(-0.15, 0.5, 0.9);
            antL.rotation.x = -0.5;
            group.add(antL);

            const antR = new THREE.Mesh(antGeo, antMat);
            antR.position.set(0.15, 0.5, 0.9);
            antR.rotation.x = -0.5;
            group.add(antR);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.12, 6, 4);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });

            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.25, 0.25, 1.0);
            group.add(eyeL);

            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.25, 0.25, 1.0);
            group.add(eyeR);

            flyMesh = group;
            flyMesh.position.set(fly.x, 1.5, fly.z);
            scene.add(flyMesh);
        }

        // ===== FOOD =====
        function initFood() {
            addFood(8, 8, 1);
            addFood(22, 22, 0.8);
        }

        function addFood(x, z, strength) {
            // Main food sphere
            const geo = new THREE.SphereGeometry(1.2, 12, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff4422 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.8, z);
            scene.add(mesh);

            // Glow
            const glowGeo = new THREE.SphereGeometry(2, 8, 6);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xff2200, transparent: true, opacity: 0.2 });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.set(x, 0.8, z);
            scene.add(glow);

            // Stem
            const stemGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.8);
            const stemMat = new THREE.MeshBasicMaterial({ color: 0x228822 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.set(x, 0.4, z);
            scene.add(stem);

            foodMarkers.push({ x, z, strength, mesh, glow, stem });
        }

        // ===== CONTROLS =====
        function initControls() {
            document.getElementById('btn-play').onclick = () => {
                isPlaying = !isPlaying;
                document.getElementById('btn-play').textContent = isPlaying ? 'Pause' : 'Play';
                document.getElementById('btn-play').classList.toggle('active', isPlaying);
            };

            document.getElementById('btn-reset').onclick = () => {
                fly.x = CONFIG.boxSize / 2;
                fly.z = CONFIG.boxSize / 2;
                fly.heading = 0;
                fly.speed = 0;
                step = 0;
            };

            document.getElementById('btn-food').onclick = () => {
                addFood(
                    Math.random() * (CONFIG.boxSize - 4) + 2,
                    Math.random() * (CONFIG.boxSize - 4) + 2,
                    0.5 + Math.random() * 0.5
                );
            };
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ===== SIMULATION =====
        function simulate() {
            if(!isPlaying) return;

            const dt = 0.016;
            const box = CONFIG.boxSize;

            // Compute odor at fly
            let nearestFood = null;
            let nearestDist = Infinity;
            brain.odor = 0;

            for(const f of foodMarkers) {
                const dx = f.x - fly.x;
                const dz = f.z - fly.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if(dist < nearestDist) {
                    nearestDist = dist;
                    nearestFood = f;
                }
                if(dist < 10) {
                    brain.odor += f.strength * Math.exp(-dist / 3);
                }
            }
            brain.odor = Math.min(1, brain.odor);

            // Brain processing
            brain.al = brain.odor * 0.9 + Math.random() * 0.1;
            brain.mb = brain.al * 0.8 + brain.mb * 0.3 + Math.random() * 0.05;
            brain.cx = brain.mb * 0.7 + Math.random() * 0.05;
            brain.vnc = brain.cx * 0.8;

            // Motor output
            fly.speed = brain.vnc * 0.8;
            fly.heading += (Math.random() - 0.5) * brain.cx * 0.3;

            // Move fly toward food if odor detected
            if(nearestFood && nearestDist > 2) {
                const toFood = Math.atan2(nearestFood.z - fly.z, nearestFood.x - fly.x);
                let diff = toFood - fly.heading;
                while(diff > Math.PI) diff -= Math.PI * 2;
                while(diff < -Math.PI) diff += Math.PI * 2;
                fly.heading += diff * 0.05 * brain.odor;
            }

            // Update fly position
            fly.x += Math.cos(fly.heading) * fly.speed * dt * 15;
            fly.z += Math.sin(fly.heading) * fly.speed * dt * 15;
            fly.x = (fly.x + box) % box;
            fly.z = (fly.z + box) % box;

            // Update fly mesh
            flyMesh.position.set(fly.x, 1.5, fly.z);
            flyMesh.rotation.y = -fly.heading;

            // Wing animation
            flyMesh.children[1].rotation.z = Math.sin(step * 0.3) * 0.4 * fly.speed;
            flyMesh.children[2].rotation.z = -Math.sin(step * 0.3) * 0.4 * fly.speed;

            // Update particles
            const pos = window.particlePositions;
            const vel = window.particleVelocities;
            const dummy = new THREE.Object3D();
            const color = new THREE.Color();

            for(let i = 0; i < CONFIG.particles; i++) {
                const i3 = i * 3;

                // Attraction to food
                for(const f of foodMarkers) {
                    const dx = f.x - pos[i3];
                    const dz = f.z - pos[i3+2];
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    if(dist < 8 && dist > 0.5) {
                        const force = f.strength * 0.1 / (dist + 1);
                        vel[i3] += dx / dist * force;
                        vel[i3+2] += dz / dist * force;
                    }
                }

                // Attraction to fly (pheromone trail)
                const fdx = fly.x - pos[i3];
                const fdz = fly.z - pos[i3+2];
                const fdist = Math.sqrt(fdx*fdx + fdz*fdz);
                if(fdist < 5 && fdist > 0.5) {
                    const ff = 0.05 / (fdist + 1);
                    vel[i3] += fdx / fdist * ff;
                    vel[i3+2] += fdz / fdist * ff;
                }

                // Random motion
                vel[i3] += (Math.random() - 0.5) * 0.01;
                vel[i3+1] += (Math.random() - 0.5) * 0.01 - 0.002;
                vel[i3+2] += (Math.random() - 0.5) * 0.01;

                // Damping
                vel[i3] *= 0.98;
                vel[i3+1] *= 0.98;
                vel[i3+2] *= 0.98;

                // Update position
                pos[i3] += vel[i3];
                pos[i3+1] += vel[i3+1];
                pos[i3+2] += vel[i3+2];

                // Bounds
                pos[i3] = (pos[i3] + box) % box;
                pos[i3+1] = Math.max(0.3, Math.min(6, pos[i3+1]));
                pos[i3+2] = (pos[i3+2] + box) % box;

                // Update mesh
                dummy.position.set(pos[i3], pos[i3+1], pos[i3+2]);
                const v = Math.sqrt(vel[i3]**2 + vel[i3+1]**2 + vel[i3+2]**2);
                dummy.scale.setScalar(0.5 + Math.min(v * 5, 1));
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);

                color.setHSL(0.4 - Math.min(v * 0.08, 0.25), 0.85, 0.5);
                particles.setColorAt(i, color);
            }

            particles.instanceMatrix.needsUpdate = true;
            particles.instanceColor.needsUpdate = true;

            // Animate food
            const t = performance.now() * 0.001;
            foodMarkers.forEach((f, i) => {
                const pulse = 1 + Math.sin(t * 2 + i) * 0.1;
                f.mesh.scale.setScalar(pulse);
                f.glow.scale.setScalar(pulse * 1.5);
            });

            step++;
        }

        // ===== UI =====
        function updateUI() {
            // Stats
            document.getElementById('stat-particles').textContent = CONFIG.particles;
            document.getElementById('stat-fps').textContent = fps;
            document.getElementById('stat-step').textContent = step;

            // Brain
            document.getElementById('bar-al').style.width = (brain.al * 100) + '%';
            document.getElementById('val-al').textContent = Math.round(brain.al * 100) + '%';

            document.getElementById('bar-mb').style.width = (brain.mb * 100) + '%';
            document.getElementById('val-mb').textContent = Math.round(brain.mb * 100) + '%';

            document.getElementById('bar-cx').style.width = (brain.cx * 100) + '%';
            document.getElementById('val-cx').textContent = Math.round(brain.cx * 100) + '%';

            document.getElementById('bar-vnc').style.width = (brain.vnc * 100) + '%';
            document.getElementById('val-vnc').textContent = Math.round(brain.vnc * 100) + '%';

            // Motor
            document.getElementById('motor-speed').textContent = fly.speed.toFixed(1);
            document.getElementById('motor-turn').textContent = Math.round(fly.heading * 180 / Math.PI) + '°';
            document.getElementById('motor-odor').textContent = Math.round(brain.odor * 100) + '%';
            document.getElementById('motor-food').textContent = foodMarkers.length;

            // Fly status
            const statusEl = document.getElementById('fly-status');
            if(brain.odor > 0.5) {
                statusEl.textContent = 'Tracking food!';
                statusEl.style.color = '#00ff88';
            } else if(brain.vnc > 0.2) {
                statusEl.textContent = 'Moving...';
                statusEl.style.color = '#50b4ff';
            } else {
                statusEl.textContent = 'Searching...';
                statusEl.style.color = '#607080';
            }
        }

        // ===== LOOP =====
        function animate() {
            requestAnimationFrame(animate);

            frameCount++;
            const now = performance.now();
            if(now - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = now;
            }

            simulate();
            if(step % 2 === 0) updateUI();

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
