<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a1e"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="neuronGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="200" fill="url(#bgGrad)" rx="12"/>
  <!-- Neural network left side -->
  <g opacity="0.2" stroke="url(#neuronGrad)" fill="none">
    <circle cx="55" cy="55" r="5" fill="#ff6b9d" opacity="0.5"/>
    <circle cx="40" cy="110" r="4" fill="#c084fc" opacity="0.4"/>
    <circle cx="75" cy="140" r="6" fill="#ff6b9d" opacity="0.5"/>
    <circle cx="100" cy="80" r="4" fill="#c084fc" opacity="0.3"/>
    <circle cx="130" cy="130" r="5" fill="#ff6b9d" opacity="0.4"/>
    <circle cx="150" cy="65" r="3" fill="#c084fc" opacity="0.3"/>
    <line x1="55" y1="55" x2="100" y2="80" stroke-width="1"/>
    <line x1="40" y1="110" x2="75" y2="140" stroke-width="1"/>
    <line x1="75" y1="140" x2="130" y2="130" stroke-width="1"/>
    <line x1="100" y1="80" x2="150" y2="65" stroke-width="1"/>
    <line x1="55" y1="55" x2="40" y2="110" stroke-width="0.8"/>
    <line x1="100" y1="80" x2="130" y2="130" stroke-width="0.8"/>
    <line x1="150" y1="65" x2="130" y2="130" stroke-width="0.8"/>
    <path d="M55,55 Q30,30 20,25" stroke-width="0.6"/>
    <path d="M55,55 Q65,30 80,25" stroke-width="0.6"/>
    <path d="M75,140 Q60,165 45,175" stroke-width="0.6"/>
    <path d="M75,140 Q95,165 110,170" stroke-width="0.6"/>
  </g>
  <!-- Neural network right side (mirrored) -->
  <g opacity="0.2" stroke="url(#neuronGrad)" fill="none" transform="translate(600,0) scale(-1,1)">
    <circle cx="55" cy="55" r="5" fill="#ff6b9d" opacity="0.5"/>
    <circle cx="40" cy="110" r="4" fill="#c084fc" opacity="0.4"/>
    <circle cx="75" cy="140" r="6" fill="#ff6b9d" opacity="0.5"/>
    <circle cx="100" cy="80" r="4" fill="#c084fc" opacity="0.3"/>
    <circle cx="130" cy="130" r="5" fill="#ff6b9d" opacity="0.4"/>
    <circle cx="150" cy="65" r="3" fill="#c084fc" opacity="0.3"/>
    <line x1="55" y1="55" x2="100" y2="80" stroke-width="1"/>
    <line x1="40" y1="110" x2="75" y2="140" stroke-width="1"/>
    <line x1="75" y1="140" x2="130" y2="130" stroke-width="1"/>
    <line x1="100" y1="80" x2="150" y2="65" stroke-width="1"/>
    <line x1="55" y1="55" x2="40" y2="110" stroke-width="0.8"/>
    <line x1="100" y1="80" x2="130" y2="130" stroke-width="0.8"/>
    <line x1="150" y1="65" x2="130" y2="130" stroke-width="0.8"/>
    <path d="M55,55 Q30,30 20,25" stroke-width="0.6"/>
    <path d="M55,55 Q65,30 80,25" stroke-width="0.6"/>
    <path d="M75,140 Q60,165 45,175" stroke-width="0.6"/>
    <path d="M75,140 Q95,165 110,170" stroke-width="0.6"/>
  </g>
  <!-- Glow behind text -->
  <text x="300" y="125"
        font-family="Jacquard 24, cursive"
        font-size="95"
        fill="#ff6b9d"
        text-anchor="middle"
        opacity="0.3"
        filter="url(#softGlow)">
    oNeuro
  </text>
  <!-- Main text -->
  <text x="300" y="125"
        font-family="Jacquard 24, cursive"
        font-size="95"
        fill="url(#textGlow)"
        text-anchor="middle"
        filter="url(#glow)">
    oNeuro
  </text>
  <!-- Subtitle -->
  <text x="300" y="163"
        font-family="Courier New, monospace"
        font-size="12"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="5">
    ORGANIC NEURAL NETWORKS
  </text>
</svg>
