<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a1e"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" fill="url(#bgGrad)" rx="24"/>
  <g opacity="0.12" stroke="#ff6b9d" fill="none">
    <circle cx="50" cy="50" r="3" fill="#ff6b9d" opacity="0.4"/>
    <circle cx="206" cy="50" r="3" fill="#c084fc" opacity="0.4"/>
    <circle cx="50" cy="206" r="3" fill="#c084fc" opacity="0.4"/>
    <circle cx="206" cy="206" r="3" fill="#ff6b9d" opacity="0.4"/>
    <line x1="50" y1="50" x2="128" y2="100" stroke-width="0.8"/>
    <line x1="206" y1="50" x2="128" y2="100" stroke-width="0.8"/>
    <line x1="50" y1="206" x2="128" y2="156" stroke-width="0.8"/>
    <line x1="206" y1="206" x2="128" y2="156" stroke-width="0.8"/>
  </g>
  <text x="128" y="140"
        font-family="Jacquard 24, cursive"
        font-size="58"
        fill="#ff6b9d"
        text-anchor="middle"
        opacity="0.3"
        filter="url(#softGlow)">
    oNeuro
  </text>
  <text x="128" y="140"
        font-family="Jacquard 24, cursive"
        font-size="58"
        fill="url(#textGlow)"
        text-anchor="middle"
        filter="url(#glow)">
    oNeuro
  </text>
  <text x="128" y="170"
        font-family="Courier New, monospace"
        font-size="8"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="3">
    ORGANIC NEURAL NETWORKS
  </text>
</svg>
